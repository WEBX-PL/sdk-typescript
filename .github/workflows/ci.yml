name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate OpenAPI types
        run: pnpm generate

      - name: Ensure generated types are committed
        run: |
          if [[ -n "$(git status --porcelain src/generated)" ]]; then
            echo "::error::src/generated/openapi.d.ts is out of date. Run \`pnpm generate\` and commit the result."
            git --no-pager diff src/generated
            exit 1
          fi

      - name: Typecheck
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
